<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register</title>

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0d6efd">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body.bg-dark .card { background:#1e1e1e; color:white; }
body.bg-dark .form-control { background:#2c2c2c; color:white; border:1px solid #444; }
</style>
</head>

<body class="bg-light d-flex align-items-center" style="min-height:100vh;">

<div class="container">
<div class="row justify-content-center">
<div class="col-12 col-md-5 col-lg-4">

<div class="card p-4 shadow">

<div class="d-flex justify-content-between mb-2">
<h5>Register</h5>
<button id="darkBtn" class="btn btn-sm btn-outline-dark" onclick="toggleDark()">🌙</button>
</div>

<input class="form-control mb-3" id="username" placeholder="Username">
<input class="form-control mb-3" id="password" type="password" placeholder="Password">
<input class="form-control mb-3" id="fullName" placeholder="Full Name">
<input class="form-control mb-3" id="email" placeholder="Email">

<button class="btn btn-success w-100 py-2" onclick="register()">Register</button>

<div class="text-center mt-3">
<a href="login.html">Back to Login</a>
</div>

</div>
</div>
</div>
</div>

<script>

function register(){

    if(!username.value || !password.value){
        alert("Username & Password required");
        return;
    }

    fetch(`${location.origin}/api/auth/register`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            username:username.value,
            password:password.value,
            fullName:fullName.value,
            email:email.value
        })
    })
    .then(res => {
        if(!res.ok){
            return res.text().then(err => { throw new Error(err); });
        }
        return res.json();
    })
    .then(() => {
        alert("Registered successfully");
        location.href = "login.html";
    })
    .catch(err => {
        alert("Registration failed: " + err.message);
    });
}

function logout(){
    localStorage.removeItem("user");
    location.href = "login.html";
}

// dark mode
document.addEventListener("DOMContentLoaded", () => {

const btn = document.getElementById("darkBtn");

function applyDark(isDark){
    document.body.classList.toggle("bg-dark", isDark);
    document.body.classList.toggle("text-light", isDark);
    btn.innerText = isDark ? "☀️" : "🌙";
}

const isDark = localStorage.getItem("dark") === "true";
applyDark(isDark);

window.toggleDark = function(){
    const newState = !document.body.classList.contains("bg-dark");
    localStorage.setItem("dark", newState);
    applyDark(newState);
};

});

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
}

</script>

</body>
</html>
