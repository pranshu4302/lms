<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Employee</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body.bg-dark .card { background:#1e1e1e; color:white; }
body.bg-dark .table { color:white; }
body.bg-dark input, 
body.bg-dark select {
    background:#2c2c2c;
    color:white;
    border:1px solid #444;
}
</style>
</head>

<body class="p-3">

<div class="container">

<div class="d-flex justify-content-between mb-3">
<h5>Employee</h5>
<div>
<button id="darkBtn" class="btn btn-sm btn-outline-dark" onclick="toggleDark()">🌙</button>
<button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
</div>
</div>

<div class="card p-3 mb-3">
<h6>Apply Leave</h6>

<select class="form-select mb-2" id="type">
<option value="CASUAL">Casual</option>
<option value="SICK">Sick</option>
<option value="ANNUAL">Annual</option>
</select>

<input class="form-control mb-2" id="start" type="date">
<input class="form-control mb-2" id="end" type="date">
<input class="form-control mb-2" id="reason" placeholder="Reason">

<button class="btn btn-success w-100" onclick="applyLeave()">Apply</button>
</div>

<button class="btn btn-primary w-100 mb-2" onclick="loadHistory()">Load History</button>

<div class="table-responsive">
<table class="table table-bordered">
<thead>
<tr>
<th>Type</th>
<th>Status</th>
<th>Remarks</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>

let user = JSON.parse(localStorage.getItem("user"));

if (!user) {
    alert("Please login first");
    location.href = "login.html";
}

function logout(){
    localStorage.removeItem("user");
    location.href = "login.html";
}

function applyLeave(){
fetch(`${window.location.origin}/api/leaves/apply`,{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
    username:user.username,
    leaveType:type.value,
    startDate:start.value,
    endDate:end.value,
    reason:reason.value
})
})
.then(()=>{
    alert("Leave Applied");
    loadHistory();
});
}

function loadHistory(){
fetch(`${window.location.origin}/api/leaves/my?username=${user.username}`)
.then(r=>r.json())
.then(data=>{
    table.innerHTML="";

    data.forEach(l=>{
        let badgeClass =
            l.status==="APPROVED" ? "bg-success" :
            l.status==="REJECTED" ? "bg-danger" :
            "bg-warning";

        table.innerHTML+=`
        <tr>
            <td>${l.leaveType}</td>
            <td><span class="badge ${badgeClass}">${l.status}</span></td>
            <td>${l.remarks || "-"}</td>
        </tr>`;
    });
});
}

// dark mode
document.addEventListener("DOMContentLoaded", () => {

const btn = document.getElementById("darkBtn");

function applyDark(isDark){
    document.body.classList.toggle("bg-dark", isDark);
    document.body.classList.toggle("text-light", isDark);
    btn.innerText = isDark ? "☀️" : "🌙";
}

const isDark = localStorage.getItem("dark") === "true";
applyDark(isDark);

window.toggleDark = function(){
    const newState = !document.body.classList.contains("bg-dark");
    localStorage.setItem("dark", newState);
    applyDark(newState);
};

});

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
}

</script>

</body>
</html>
